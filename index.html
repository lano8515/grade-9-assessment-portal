<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHS Scratch Portal</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- CryptoJS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

</head>

<body class="bg-slate-100 p-6">

<h1 class="text-3xl font-bold mb-4">Scratch Submission Portal</h1>

<p id="deadline-text" class="text-red-600 mb-4"></p>

<!-- FORM -->
<form id="submission-form" class="bg-white p-6 rounded-xl shadow mb-6">
    <input id="student-name" placeholder="Name" class="border p-2 w-full mb-3">
    <input id="project-title" placeholder="Project Title" class="border p-2 w-full mb-3">
    <input id="scratch-link" placeholder="Scratch Link or ID" class="border p-2 w-full mb-3">
    <textarea id="description" placeholder="Description" class="border p-2 w-full mb-3"></textarea>

    <button class="bg-blue-600 text-white px-4 py-2 rounded">Submit</button>
</form>

<!-- LOGIN -->
<div class="mb-6">
    <input type="password" id="teacher-password" placeholder="Teacher password" class="border p-2">
    <button onclick="verifyTeacherPassword()" class="bg-green-600 text-white px-4 py-2">Login</button>
    <p id="password-error" class="text-red-500 hidden">Wrong password</p>
</div>

<!-- TABLE -->
<table class="w-full bg-white rounded shadow">
<thead>
<tr class="bg-gray-200">
<th>Name</th><th>Title</th><th>Score</th><th>Status</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>

/* =========================
   🔥 FIREBASE CONFIG
========================= */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* =========================
   🔐 SECURITY
========================= */
const TEACHER_HASH = "5f4dcc3b5aa765d61d8327deb882cf99"; // "password"
let teacherAuthenticated = false;

/* =========================
   ⏰ DEADLINE
========================= */
const DEADLINE = new Date("2026-04-18T23:59:59");

/* =========================
   🧠 GLOBAL DATA
========================= */
let submissions = [];

/* =========================
   📥 LOAD FROM FIREBASE
========================= */
function loadSubmissions() {
    db.collection("submissions").get().then(snapshot => {
        submissions = snapshot.docs.map(doc => ({
            id: doc.id,
            ...doc.data()
        }));
        renderTable();
    });
}

/* =========================
   💾 SAVE TO FIREBASE
========================= */
function saveSubmission(sub) {
    db.collection("submissions").add(sub)
        .then(loadSubmissions);
}

/* =========================
   🧠 SCRATCH ID
========================= */
function extractProjectId(input) {
    const match = input.match(/projects\/(\d+)/);
    if (match) return match[1];
    if (/^\d+$/.test(input)) return input;
    return null;
}

/* =========================
   📤 SUBMIT
========================= */
document.getElementById("submission-form").onsubmit = function(e) {
    e.preventDefault();

    if (new Date() > DEADLINE) {
        alert("Deadline passed!");
        return;
    }

    let name = document.getElementById("student-name").value;
    let title = document.getElementById("project-title").value;
    let link = document.getElementById("scratch-link").value;
    let desc = document.getElementById("description").value;

    if (!name || !title || !link || !desc) {
        alert("Fill all fields");
        return;
    }

    let id = extractProjectId(link);
    if (!id) {
        alert("Invalid Scratch link");
        return;
    }

    let sub = {
        student: name,
        title,
        link: `https://scratch.mit.edu/projects/${id}/`,
        description: desc,
        date: new Date().toISOString().split('T')[0],
        score: null,
        status: "Pending"
    };

    saveSubmission(sub);
    this.reset();
};

/* =========================
   📊 TABLE
========================= */
function renderTable() {
    let html = "";
    submissions.forEach((s, i) => {
        html += `
        <tr>
        <td>${s.student}</td>
        <td>${s.title}</td>
        <td>
            ${teacherAuthenticated 
                ? `<input type="number" value="${s.score || ''}" onchange="updateScore('${s.id}', this.value)">`
                : (s.score ?? '-')}
        </td>
        <td>${s.status}</td>
        </tr>`;
    });
    document.getElementById("table").innerHTML = html;
}

/* =========================
   ✏️ UPDATE SCORE
========================= */
function updateScore(id, score) {
    db.collection("submissions").doc(id).update({
        score: parseInt(score),
        status: "Graded"
    }).then(loadSubmissions);
}

/* =========================
   🔐 LOGIN
========================= */
function verifyTeacherPassword() {
    const password = document.getElementById('teacher-password').value;
    const hashed = CryptoJS.MD5(password).toString();

    if (hashed === TEACHER_HASH) {
        teacherAuthenticated = true;
        document.getElementById("password-error").classList.add("hidden");
        renderTable();
    } else {
        document.getElementById("password-error").classList.remove("hidden");
    }
}

/* =========================
   ⏳ DEADLINE UI
========================= */
function updateCountdown() {
    const diff = DEADLINE - new Date();

    if (diff <= 0) {
        document.getElementById("deadline-text").innerText = "Submission Closed";
        document.querySelector("button").disabled = true;
        return;
    }

    const hours = Math.floor(diff / (1000 * 60 * 60));
    document.getElementById("deadline-text").innerText =
        `Deadline in ${hours} hours`;
}

setInterval(updateCountdown, 1000);

/* =========================
   🚀 INIT
========================= */
loadSubmissions();
updateCountdown();

</script>

</body>
</html>
