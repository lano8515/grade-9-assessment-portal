<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CHS Scratch Portal</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body { font-family: Inter, sans-serif; }
</style>
</head>

<body class="bg-slate-50">

<header class="bg-blue-800 text-white p-4 flex justify-between items-center">
    <h1 class="font-bold">CHS Scratch Portal</h1>

    <div class="flex gap-2">
        <input id="teacher-password" type="password" placeholder="Teacher password"
               class="px-2 py-1 text-black rounded">
        <button onclick="loginTeacher()" class="bg-white text-blue-800 px-3 py-1 rounded">
            Login
        </button>
    </div>
</header>

<div class="p-6 max-w-5xl mx-auto">

<!-- DEADLINE -->
<div class="bg-red-100 text-red-700 p-3 rounded mb-4 text-center">
    ⏰ <span id="deadline"></span>
</div>

<!-- FORM -->
<form onsubmit="submitProject(event)" class="bg-white p-4 rounded shadow space-y-2">
    <input id="name" placeholder="Student Name" class="w-full border p-2">
    <input id="title" placeholder="Project Title" class="w-full border p-2">
    <input id="link" placeholder="Scratch Link or ID" class="w-full border p-2">
    <textarea id="desc" placeholder="Description" class="w-full border p-2"></textarea>

    <button id="submitBtn" class="bg-blue-700 text-white w-full p-2">
        Submit Project
    </button>
</form>

<!-- TABLE -->
<table class="w-full mt-6 bg-white shadow">
    <thead class="bg-gray-200">
        <tr>
            <th class="p-2">Student</th>
            <th class="p-2">Title</th>
            <th class="p-2">Score</th>
            <th class="p-2">Status</th>
        </tr>
    </thead>
    <tbody id="table"></tbody>
</table>

</div>

<script>

/* 🔥 FIREBASE CONFIG (REPLACE THIS) */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* STATE */
let teacher = false;

/* PASSWORD */
const TEACHER_PASSWORD = "Hill2012";

/* DEADLINE */
const DEADLINE = new Date("2026-04-18T23:59:59");

/* LOAD DATA */
let submissions = [];

function loadData() {
    db.collection("submissions")
    .orderBy("date", "desc")
    .onSnapshot(snapshot => {
        submissions = snapshot.docs.map(doc => ({
            id: doc.id,
            ...doc.data()
        }));
        render();
    });
}

/* SUBMIT */
function submitProject(e) {
    e.preventDefault();

    if (new Date() > DEADLINE) {
        alert("Deadline closed!");
        return;
    }

    db.collection("submissions").add({
        student: name.value,
        title: title.value,
        link: link.value,
        description: desc.value,
        date: new Date().toISOString().split("T")[0],
        score: null,
        status: "Pending"
    });

    e.target.reset();
}

/* RENDER */
function render() {
    table.innerHTML = submissions.map(s => `
        <tr class="border-t">
            <td class="p-2">${s.student}</td>
            <td class="p-2">${s.title}</td>
            <td class="p-2 text-center">
                ${teacher ? `
                    <input type="number" value="${s.score ?? ''}"
                    onchange="grade('${s.id}', this.value)"
                    class="border w-16 text-center">
                ` : (s.score ?? "-")}
            </td>
            <td class="p-2 text-center">${s.status}</td>
        </tr>
    `).join("");
}

/* GRADE */
function grade(id, score) {
    db.collection("submissions").doc(id).update({
        score: parseInt(score),
        status: "Graded"
    });
}

/* TEACHER LOGIN */
function loginTeacher() {
    const input = document.getElementById("teacher-password").value;

    if (input === TEACHER_PASSWORD) {
        teacher = true;
        alert("Teacher mode enabled");
        render();
    } else {
        alert("Wrong password");
    }
}

/* DEADLINE UI */
function updateDeadline() {
    const diff = DEADLINE - new Date();

    if (diff <= 0) {
        document.getElementById("deadline").innerText = "Submission CLOSED";
        document.getElementById("submitBtn").disabled = true;
        return;
    }

    document.getElementById("deadline").innerText =
        Math.floor(diff / 3600000) + " hours left";
}

setInterval(updateDeadline, 1000);

/* INIT */
loadData();
updateDeadline();

</script>

</body>
</html>
