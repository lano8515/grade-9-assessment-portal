<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hill School Eldoret • Submission Portal</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body { font-family: Inter, sans-serif; }
.card { transition: 0.3s; }
.card:hover { transform: translateY(-4px); }
</style>
</head>

<body class="bg-slate-100">

<!-- HEADER -->
<header class="bg-blue-900 text-white p-4 flex justify-between">
<h1 class="font-bold">🏫 Hill School Eldoret Portal</h1>
<button onclick="openLogin()" class="bg-white text-blue-900 px-3 rounded">
Teacher Login
</button>
</header>

<!-- DEADLINE -->
<div class="text-center text-red-600 font-bold p-2">
⏰ <span id="deadlineText"></span>
</div>

<!-- MAIN -->
<div class="max-w-6xl mx-auto p-4 grid md:grid-cols-2 gap-4">

<!-- FORM -->
<div class="bg-white p-4 rounded shadow card">
<h2 class="font-bold mb-2">Submit Project</h2>

<input id="student" placeholder="Student Name" class="border p-2 w-full mb-2 rounded">
<input id="title" placeholder="Project Title" class="border p-2 w-full mb-2 rounded">
<input id="link" placeholder="Scratch Link" class="border p-2 w-full mb-2 rounded">
<textarea id="desc" placeholder="Description" class="border p-2 w-full mb-2 rounded"></textarea>

<button onclick="submitProject()" class="bg-blue-700 text-white w-full p-2 rounded">
Submit
</button>
</div>

<!-- STUDENT VIEW -->
<div class="bg-white p-4 rounded shadow">
<h2 class="font-bold mb-2">Submissions</h2>
<div id="studentList"></div>
</div>

</div>

<!-- TEACHER -->
<div id="teacherPanel" class="hidden max-w-6xl mx-auto p-4">
<h2 class="font-bold text-xl mb-2">Teacher Dashboard</h2>
<div id="teacherList"></div>
</div>

<!-- LOGIN -->
<div id="loginModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center">
<div class="bg-white p-4 rounded shadow w-80">
<h2 class="font-bold mb-2">Teacher Login</h2>
<input id="password" type="password" class="border p-2 w-full mb-2 rounded">
<button onclick="login()" class="bg-blue-700 text-white w-full p-2 rounded">
Login
</button>
</div>
</div>

<script>

/* 🔥 FIREBASE (PUT YOUR REAL CONFIG HERE) */
firebase.initializeApp({
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_AUTH_DOMAIN",
projectId: "YOUR_PROJECT_ID"
});

const db = firebase.firestore();

/* SETTINGS */
const TEACHER_PASSWORD = "Hill2012";
const DEADLINE = new Date("2026-04-18T23:59:59");

let isTeacher = false;
let cache = [];

/* SAFE LOAD (fixes empty teacher dashboard issue) */
function loadData(){
db.collection("submissions").orderBy("date","desc")
.onSnapshot(snapshot=>{
cache = snapshot.docs.map(d=>({id:d.id,...d.data()}));
render();
});
}

/* SUBMIT */
function submitProject(){

if(new Date() > DEADLINE){
alert("Deadline closed!");
return;
}

const data = {
student: student.value,
title: title.value,
link: link.value,
desc: desc.value,
date: new Date().toISOString().split("T")[0],
status: "Pending",
score: null
};

db.collection("submissions").add(data);

student.value = title.value = link.value = desc.value = "";
}

/* RENDER */
function render(){

/* student view */
studentList.innerHTML = cache.map(d=>`
<div class="border p-2 mb-2 rounded">
<b>${d.student}</b><br>${d.title}<br>
Status: ${d.status}
</div>
`).join("");


/* teacher view */
teacherList.innerHTML = cache.map(d=>`
<div class="bg-slate-100 p-2 mb-2 rounded">
<b>${d.student}</b> - ${d.title}<br>
Score: ${d.score ?? "Not graded"}
</div>
`).join("");
}

/* LOGIN */
function openLogin(){
loginModal.classList.remove("hidden");
}

function login(){
if(password.value === TEACHER_PASSWORD){
isTeacher = true;
teacherPanel.classList.remove("hidden");
loginModal.classList.add("hidden");
render();
}else{
alert("Wrong password");
}
}

/* DEADLINE */
setInterval(()=>{
const diff = DEADLINE - new Date();

deadlineText.innerText =
diff > 0
? Math.floor(diff/3600000) + " hours left"
: "SUBMISSION CLOSED";
},1000);

/* START */
loadData();

</script>

</body>
</html>
